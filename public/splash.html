<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link rel="preload" href="/PsDesign_icon.png" as="image" />
  <link rel="preload" href="/opus_logo.png" as="image" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #212121;
    }
    .splash {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 38px 0 36px;
      background: #212121;
      border-radius: 8px;
      color: #ffffff;
    }
    .brand-pane {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 24px;
      min-width: 0;
    }
    .brand-icon {
      width: 84px;
      height: 84px;
      object-fit: contain;
      opacity: 0;
      transform: translateY(8px) scale(0.985);
      transition:
        opacity 1.6s ease,
        transform 1.6s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform;
      user-select: none;
      -webkit-user-drag: none;
    }
    .brand-name {
      margin: 0;
      line-height: 1;
    }
    .brand-logo {
      display: block;
      width: 172px;
      max-width: 100%;
      height: auto;
      opacity: 0;
      transform: translateY(8px) scale(0.985);
      transition:
        opacity 1.6s 0.08s ease,
        transform 1.6s 0.08s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform;
      user-select: none;
      -webkit-user-drag: none;
    }
    .progress-pane {
      display: none;
    }
    .splash.is-ready .brand-icon,
    .splash.is-ready .brand-logo {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    @media (prefers-reduced-motion: reduce) {
      .brand-icon,
      .brand-logo {
        transition: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="splash" data-tauri-drag-region>
    <div class="brand-pane" data-tauri-drag-region>
      <img class="brand-icon" src="/PsDesign_icon.png" alt="OPUS" draggable="false" />
      <h1 class="brand-name" data-tauri-drag-region>
        <img class="brand-logo" src="/opus_logo.png" alt="OPUS" draggable="false" />
      </h1>
    </div>
  </div>
  <script>
    let current = 0;

    const setProgress = (value) => {
      current = Math.max(0, Math.min(100, Number(value) || 0));
    };

    let timer = setInterval(() => {
      setProgress(Math.min(55, current + Math.random() * 4 + 1));
      if (current >= 55) clearInterval(timer);
    }, 120);

    window.__splashSetProgress = (value) => {
      clearInterval(timer);
      setProgress(value);
    };
  </script>
</body>
</html>
