<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: transparent;
    }
    .splash {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 48% 52%;
      padding: 10px;
      background: #303030;
      border-radius: 10px;
      color: #ffffff;
    }
    .brand-pane {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      min-width: 0;
    }
    .brand-icon {
      width: 86px;
      height: 86px;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }
    .brand-name {
      margin: 0;
      font-size: 48px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 0;
    }
    .progress-pane {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border-radius: 10px;
      color: #7a7a7a;
    }
    .progress-inner {
      width: min(350px, calc(100% - 80px));
      text-align: center;
    }
    .splash-message {
      margin: 0 0 40px;
      font-size: 24px;
      line-height: 1.35;
      font-weight: 600;
      text-align: left;
      display: inline-block;
    }
    .splash-progress-track {
      height: 5px;
      width: 100%;
      background: #e6e6e6;
      overflow: hidden;
    }
    .splash-progress-fill {
      width: 0%;
      height: 100%;
      background: #0d8fe8;
      transition: width 0.28s ease-out;
    }
    .splash-percent {
      margin-top: 28px;
      font-size: 42px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <div class="splash" data-tauri-drag-region>
    <div class="brand-pane" data-tauri-drag-region>
      <img class="brand-icon" src="/PsDesign_icon.png" alt="PsDesign" draggable="false" />
      <h1 class="brand-name">PsDesign</h1>
    </div>
    <div class="progress-pane" data-tauri-drag-region>
      <div class="progress-inner" data-tauri-drag-region>
        <p class="splash-message" data-tauri-drag-region>PsDesignを<br>起動しています...</p>
        <div class="splash-progress-track" data-tauri-drag-region>
          <div class="splash-progress-fill" id="progress-fill"></div>
        </div>
        <div class="splash-percent" id="splash-percent" data-tauri-drag-region>0%</div>
      </div>
    </div>
  </div>
  <script>
    const fill = document.getElementById("progress-fill");
    const percent = document.getElementById("splash-percent");
    let current = 0;
    let timer = setInterval(() => {
      current = Math.min(55, current + Math.random() * 4 + 1);
      fill.style.width = `${current}%`;
      percent.textContent = `${Math.round(current)}%`;
      if (current >= 55) clearInterval(timer);
    }, 120);

    window.__splashSetProgress = (value) => {
      clearInterval(timer);
      current = Math.max(0, Math.min(100, Number(value) || 0));
      fill.style.width = `${current}%`;
      percent.textContent = `${Math.round(current)}%`;
    };
  </script>
</body>
</html>
