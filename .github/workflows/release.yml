name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build & sign
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json for updater
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NSIS_FILE=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" | head -n 1)
          NSIS_NAME=$(basename "$NSIS_FILE")
          SIG=$(cat "$NSIS_FILE.sig")
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "Release v$VERSION",
            "pub_date": "$DATE",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$NSIS_NAME"
              }
            }
          }
          EOF
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            latest.json
