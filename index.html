<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PsDesign</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header class="toolbar" data-tauri-drag-region>
        <h1 data-tauri-drag-region class="app-logo" aria-label="PsDesign" title="PsDesign">
          <span class="app-logo-icon" aria-hidden="true">Pd</span>
        </h1>
        <button id="hamburger-btn" class="icon-btn hamburger-btn" type="button" title="メニュー" aria-label="メニュー">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="sync-segment view-mode-segment" role="group" aria-label="表示モード">
          <button id="view-parallel-btn" class="sync-seg-btn active" type="button" title="PDF / PSD を並列表示" aria-label="並列表示" aria-pressed="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="5" width="8" height="14" rx="1"/>
              <rect x="13" y="5" width="8" height="14" rx="1"/>
            </svg>
          </button>
          <button id="view-psd-only-btn" class="sync-seg-btn" type="button" title="PSD のみ表示" aria-label="PSDのみ" aria-pressed="false">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="6" y="5" width="12" height="14" rx="1"/>
            </svg>
          </button>
        </div>
        <div class="toolbar-zoom" role="group" aria-label="ズーム">
          <button id="zoom-in-btn" class="icon-btn zoom-btn" type="button" title="ズームイン (Alt+スクロール)" aria-label="ズームイン">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="11" y1="8" x2="11" y2="14"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </button>
          <button id="zoom-level-btn" class="zoom-level-btn" type="button" title="100% にリセット">100%</button>
          <button id="zoom-out-btn" class="icon-btn zoom-btn" type="button" title="ズームアウト (Alt+スクロール)" aria-label="ズームアウト">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </button>
        </div>
        <div class="toolbar-history" role="group" aria-label="履歴">
          <button id="undo-btn" class="icon-btn history-btn" type="button" title="元に戻す (Ctrl+Z)" aria-label="元に戻す" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 7h11a5 5 0 0 1 5 5v0a5 5 0 0 1-5 5H6"/>
              <polyline points="8 11 4 7 8 3"/>
            </svg>
          </button>
          <button id="redo-btn" class="icon-btn history-btn" type="button" title="やり直し (Ctrl+Y)" aria-label="やり直し" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 7H9a5 5 0 0 0-5 5v0a5 5 0 0 0 5 5h9"/>
              <polyline points="16 11 20 7 16 3"/>
            </svg>
          </button>
          <button id="clear-all-btn" class="icon-btn history-btn clear-all-btn" type="button" title="編集を全て削除 (Ctrl+Delete)" aria-label="編集を全て削除" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="9"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
            </svg>
          </button>
        </div>
        <div class="toolbar-viewmode" role="group" aria-label="ビューモード">
          <button id="skip-first-blank-btn" class="skip-blank-btn" type="button" aria-pressed="false" title="先頭ページを除外" aria-label="先頭ページを除外">
            <span class="skip-blank-box" aria-hidden="true"></span>
            <svg class="skip-blank-icon" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
              <!-- ファイル本体 + 折り返し角 -->
              <path d="M3 1.5 H10 L13 4.5 V14.5 H3 Z" fill="none" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
              <path d="M10 1.5 V4.5 H13" fill="none" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
              <!-- ファイル中央の × -->
              <g stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
                <line x1="5.5" y1="7" x2="10.5" y2="12"/>
                <line x1="10.5" y1="7" x2="5.5" y2="12"/>
              </g>
            </svg>
          </button>
          <div class="sync-segment" role="group" aria-label="同期モード">
            <button id="sync-on-btn" class="sync-seg-btn active" type="button" title="ページ同期" aria-label="ページ同期" aria-pressed="true">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
            </button>
            <button id="sync-off-btn" class="sync-seg-btn" type="button" title="ページ非同期" aria-label="ページ非同期" aria-pressed="false">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18.84 12.25l1.72-1.71a5 5 0 0 0-7.07-7.07L11 5.41"/>
                <path d="M5.17 11.75l-1.71 1.71a5 5 0 0 0 7.07 7.07L12.58 18"/>
                <line x1="8" y1="2" x2="8" y2="5"/>
                <line x1="2" y1="8" x2="5" y2="8"/>
                <line x1="16" y1="19" x2="16" y2="22"/>
                <line x1="19" y1="16" x2="22" y2="16"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="toolbar-actions">
          <button id="open-pdf-btn" class="icon-btn" title="PDF を開く" aria-label="PDF を開く">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/>
              <polyline points="14 2 14 8 20 8"/>
              <text x="12" y="19" font-size="7" text-anchor="middle" fill="currentColor" stroke="none" style="font-family: sans-serif; font-weight: 700;">PDF</text>
            </svg>
          </button>
          <button id="open-folder-btn" class="icon-btn" title="PSD を開く" aria-label="PSD を開く">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 14l1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
          <button id="open-txt-toolbar-btn" class="icon-btn" title="テキストを開く" aria-label="テキストを開く">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="8" y1="13" x2="16" y2="13"/>
              <line x1="8" y1="17" x2="16" y2="17"/>
              <line x1="8" y1="9" x2="11" y2="9"/>
            </svg>
          </button>
          <div class="save-container" id="save-container">
            <button id="save-btn" class="icon-btn" disabled title="Photoshop で保存" aria-label="Photoshop で保存" aria-haspopup="menu" aria-expanded="false">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
            </button>
            <div class="save-menu" id="save-menu" role="menu" hidden>
              <div class="save-menu-header">保存</div>
              <button class="save-menu-item" id="save-overwrite-btn" type="button" role="menuitem">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                  <polyline points="17 21 17 13 7 13 7 21"/>
                  <polyline points="7 3 7 8 15 8"/>
                </svg>
                <span class="save-menu-label">上書き保存</span>
                <span class="save-menu-shortcut">Ctrl+S</span>
              </button>
              <button class="save-menu-item" id="save-as-btn" type="button" role="menuitem">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                  <polyline points="17 21 17 13 7 13 7 21"/>
                  <polyline points="7 3 7 8 15 8"/>
                  <line x1="12" y1="18" x2="12" y2="11"/>
                  <polyline points="9 14 12 11 15 14"/>
                </svg>
                <span class="save-menu-label">別名で保存</span>
                <span class="save-menu-shortcut">Ctrl+Shift+S</span>
              </button>
            </div>
          </div>
        </div>
        <div class="window-controls" role="group" aria-label="ウインドウ操作">
          <button id="window-min-btn" class="window-ctrl-btn" type="button" title="最小化" aria-label="最小化">
            <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true">
              <rect x="2" y="6" width="8" height="1" fill="currentColor"/>
            </svg>
          </button>
          <button id="window-max-btn" class="window-ctrl-btn" type="button" title="最大化/元に戻す" aria-label="最大化/元に戻す">
            <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true">
              <rect x="2.5" y="2.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1"/>
            </svg>
          </button>
          <button id="window-close-btn" class="window-ctrl-btn window-ctrl-close" type="button" title="閉じる" aria-label="閉じる">
            <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true">
              <line x1="2.5" y1="2.5" x2="9.5" y2="9.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="9.5" y1="2.5" x2="2.5" y2="9.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </header>
      <main class="workspace">
        <section class="spreads-container" id="spreads-container">
          <div id="spreads-stage" class="spreads-stage">
            <div class="spreads-pdf-area" id="spreads-pdf-area">
              <button id="pdf-rotate-btn" class="pdf-rotate-btn icon-btn" type="button" title="PDF を 90° 回転（クリックごと）" aria-label="PDF を回転" hidden>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="21 2 21 8 15 8"/>
                  <path d="M21 8A9 9 0 1 0 18.4 16.9"/>
                </svg>
              </button>
              <div id="pdf-stage" class="pdf-stage"></div>
            </div>
            <div class="spreads-psd-area" id="spreads-psd-area">
              <button id="psd-rotate-btn" class="psd-rotate-btn icon-btn" type="button" title="PSD を 90° 回転（クリックごと）" aria-label="PSD を回転" hidden>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="21 2 21 8 15 8"/>
                  <path d="M21 8A9 9 0 1 0 18.4 16.9"/>
                </svg>
              </button>
              <div id="psd-stage" class="psd-stage"></div>
              <div class="psd-rulers" id="psd-rulers" hidden>
                <canvas class="psd-ruler psd-ruler-top" id="psd-ruler-top"></canvas>
                <canvas class="psd-ruler psd-ruler-left" id="psd-ruler-left"></canvas>
                <div class="psd-ruler-corner"></div>
              </div>
              <div class="psd-guides-layer" id="psd-guides-layer" hidden></div>
            </div>
          </div>
        </section>
        <nav class="side-toolbar" role="group" aria-label="ツール">
          <div class="panel-header">
            <button id="toggle-side-toolbar-btn" class="panel-toggle-btn" type="button" title="ツールバーを折り畳む" aria-label="ツールバーを折り畳む">
              <svg class="icon-collapse" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
              <svg class="icon-expand" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>
          </div>
          <button id="tool-move" class="tool-btn icon-btn side-tool-btn" data-tool="move" title="選択ツール (V)" aria-label="選択ツール">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="5 9 2 12 5 15"/>
              <polyline points="9 5 12 2 15 5"/>
              <polyline points="15 19 12 22 9 19"/>
              <polyline points="19 9 22 12 19 15"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <line x1="12" y1="2" x2="12" y2="22"/>
            </svg>
          </button>
          <button id="toggle-rulers-btn" class="icon-btn side-tool-btn" type="button" title="定規 (Ctrl+R)" aria-label="定規" aria-pressed="false">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="9" width="20" height="6" rx="1"/>
              <line x1="6" y1="9" x2="6" y2="13"/>
              <line x1="10" y1="9" x2="10" y2="12"/>
              <line x1="14" y1="9" x2="14" y2="13"/>
              <line x1="18" y1="9" x2="18" y2="12"/>
            </svg>
          </button>
          <button id="tool-text-v" class="tool-btn icon-btn side-tool-btn" data-tool="text-v" title="縦書きツール (T)" aria-label="縦書きツール">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2 6 2 3 12 3 12 6"/>
              <line x1="4" y1="20" x2="10" y2="20"/>
              <line x1="7" y1="3" x2="7" y2="20"/>
              <line x1="18" y1="5" x2="18" y2="19"/>
              <polyline points="14 15 18 19 22 15"/>
            </svg>
          </button>
          <button id="tool-text-h" class="tool-btn icon-btn side-tool-btn" data-tool="text-h" title="横書きツール (Y)" aria-label="横書きツール">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2 6 2 3 12 3 12 6"/>
              <line x1="4" y1="20" x2="10" y2="20"/>
              <line x1="7" y1="3" x2="7" y2="20"/>
              <line x1="13" y1="12" x2="22" y2="12"/>
              <polyline points="18 8 22 12 18 16"/>
            </svg>
          </button>
          <button id="tool-pan" class="tool-btn icon-btn side-tool-btn" data-tool="pan" title="パンツール (Space長押し)" aria-label="パンツール">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 11V6a2 2 0 0 0-4 0v5"/>
              <path d="M14 10V4a2 2 0 0 0-4 0v6"/>
              <path d="M10 10.5V6a2 2 0 0 0-4 0v8"/>
              <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
            </svg>
          </button>
          <div class="page-nav" role="group" aria-label="ページ移動">
            <button id="page-prev-btn" class="icon-btn page-nav-btn" type="button" title="前のページ (←)" aria-label="前のページ">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="18 15 12 9 6 15"/>
              </svg>
            </button>
            <span id="page-nav-label" class="page-nav-label">– / –</span>
            <button id="page-next-btn" class="icon-btn page-nav-btn" type="button" title="次のページ (→)" aria-label="次のページ">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
          </div>
          <div class="fill-color-picker" role="group" aria-label="文字色">
            <div class="fill-swatch-stack">
              <button id="fill-white-btn" class="fill-swatch fill-swatch-white" type="button" data-fill="white" title="白文字（もう一度クリックで解除）" aria-label="白文字"></button>
              <button id="fill-black-btn" class="fill-swatch fill-swatch-black" type="button" data-fill="black" title="黒文字（もう一度クリックで解除）" aria-label="黒文字"></button>
            </div>
          </div>
        </nav>
        <aside class="side-panel">
          <div class="panel-header">
            <button id="toggle-side-panel-btn" class="panel-toggle-btn" type="button" title="サイドバーを折り畳む" aria-label="サイドバーを折り畳む">
              <svg class="icon-collapse" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
              <svg class="icon-expand" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>
          </div>
          <section class="panel-section txt-source" id="txt-source" data-section="txt">
            <h2 class="panel-section-h2">
              <span>原稿テキスト</span>
              <button class="section-toggle-btn" type="button" title="折りたたむ" aria-label="折りたたむ" aria-expanded="true">
                <svg class="section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </button>
            </h2>
            <div id="txt-source-actions" class="txt-source-actions" hidden>
              <span id="txt-source-name" class="txt-source-name"></span>
              <button id="clear-txt-btn" class="icon-btn txt-source-clear-btn" type="button" title="テキストをクリア" aria-label="テキストをクリア" hidden>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/>
                  <path d="M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
              </button>
            </div>
            <div id="txt-source-dropzone" class="txt-source-dropzone">
              <div id="txt-source-viewer" class="txt-source-viewer" hidden></div>
              <div id="txt-source-empty" class="txt-source-empty">
                <svg class="txt-source-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="8" y1="13" x2="16" y2="13"/>
                  <line x1="8" y1="17" x2="16" y2="17"/>
                  <line x1="8" y1="9" x2="11" y2="9"/>
                </svg>
                <p class="txt-source-empty-text">テキストファイルを選択、またはここにドロップ</p>
              </div>
            </div>
          </section>
          <section class="panel-section" data-section="editor">
          <h2 class="panel-section-h2">
            <span>編集</span>
            <button class="section-toggle-btn" type="button" title="折りたたむ" aria-label="折りたたむ" aria-expanded="true">
              <svg class="section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
          </h2>
          <div id="editor" class="editor" hidden>
            <label data-editor-scope="single">
              フォント
              <div class="font-combobox" id="edit-font-combobox">
                <input id="edit-font" class="font-input" type="text" autocomplete="off" placeholder="フォント名で検索..." />
                <button type="button" id="edit-font-toggle" class="font-combobox-toggle" aria-label="フォント一覧" tabindex="-1">▾</button>
                <ul id="edit-font-list" class="font-combobox-list" hidden role="listbox"></ul>
              </div>
            </label>
            <div class="editor-tabs-section">
              <div class="editor-tabs" role="tablist">
                <button id="editor-tab-size" class="editor-tab active" data-tab="size" data-editor-scope="single" type="button" role="tab" aria-selected="true">サイズ</button>
                <button id="editor-tab-leading" class="editor-tab" data-tab="leading" data-editor-scope="single" type="button" role="tab" aria-selected="false">行間</button>
                <button id="editor-tab-stroke" class="editor-tab" data-tab="stroke" type="button" role="tab" aria-selected="false">フチ</button>
              </div>
              <div class="editor-tab-panel" data-tab-panel="size" role="tabpanel">
                <div class="size-row">
                  <div class="size-group" role="group" aria-label="文字サイズ">
                    <button id="size-inc-btn" class="size-btn" type="button" title="大きく ( ] )">＋</button>
                    <input id="size-input" class="size-input" type="number" min="6" max="999" step="0.1" value="12" aria-label="サイズ" />
                    <span class="size-unit">pt</span>
                    <button id="size-dec-btn" class="size-btn" type="button" title="小さく ( [ )">−</button>
                  </div>
                  <div class="direction-toggle" role="group" aria-label="組方向">
                    <button id="dir-vertical-btn" class="dir-toggle-btn" type="button" data-direction="vertical" title="縦組み" aria-label="縦組み">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="2 6 2 3 12 3 12 6"/>
                        <line x1="4" y1="20" x2="10" y2="20"/>
                        <line x1="7" y1="3" x2="7" y2="20"/>
                        <line x1="18" y1="5" x2="18" y2="19"/>
                        <polyline points="14 15 18 19 22 15"/>
                      </svg>
                    </button>
                    <button id="dir-horizontal-btn" class="dir-toggle-btn" type="button" data-direction="horizontal" title="横組み" aria-label="横組み">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="2 6 2 3 12 3 12 6"/>
                        <line x1="4" y1="20" x2="10" y2="20"/>
                        <line x1="7" y1="3" x2="7" y2="20"/>
                        <line x1="13" y1="12" x2="22" y2="12"/>
                        <polyline points="18 8 22 12 18 16"/>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
              <div class="editor-tab-panel" data-tab-panel="leading" role="tabpanel" hidden>
                <div class="size-row">
                  <div class="size-group" role="group" aria-label="行間">
                    <button id="leading-inc-btn" class="size-btn" type="button" title="広く">＋</button>
                    <input id="leading-input" class="size-input" type="number" min="50" max="500" step="1" value="125" aria-label="行間" />
                    <span class="size-unit">%</span>
                    <button id="leading-dec-btn" class="size-btn" type="button" title="狭く">−</button>
                  </div>
                  <div class="ruby-toggle" role="group" aria-label="ルビ">
                    <button id="ruby-off-btn" class="ruby-toggle-btn" type="button" data-ruby="off" title="ルビなし（行間 125%）">なし</button>
                    <button id="ruby-on-btn" class="ruby-toggle-btn" type="button" data-ruby="on" title="ルビあり（行間 150%）">ルビ</button>
                  </div>
                </div>
                <span id="leading-target-label" class="leading-target-label" hidden></span>
              </div>
              <div class="editor-tab-panel" data-tab-panel="stroke" role="tabpanel" hidden>
                <div class="size-row">
                  <div class="stroke-width-group" role="group" aria-label="フチ太さ">
                    <button id="stroke-width-inc-btn" class="size-btn" type="button" title="太く" aria-label="太く">＋</button>
                    <input id="stroke-width-input" class="size-input" type="number" min="0" max="999" step="0.5" value="20" aria-label="境界線の太さ" />
                    <span class="size-unit">px</span>
                    <button id="stroke-width-dec-btn" class="size-btn" type="button" title="細く" aria-label="細く">−</button>
                  </div>
                  <div class="stroke-toggle" role="group" aria-label="境界線">
                    <button id="stroke-none-btn" class="stroke-dot stroke-dot-none" type="button" data-stroke="none" title="境界線なし" aria-label="境界線なし"></button>
                    <button id="stroke-white-btn" class="stroke-dot stroke-dot-white" type="button" data-stroke="white" title="白フチ" aria-label="白フチ"></button>
                    <button id="stroke-black-btn" class="stroke-dot stroke-dot-black" type="button" data-stroke="black" title="黒フチ" aria-label="黒フチ"></button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          </section>
          <section class="panel-section" data-section="layers">
          <h2 class="panel-section-h2">
            <span>テキストレイヤー</span>
            <button class="section-toggle-btn" type="button" title="折りたたむ" aria-label="折りたたむ" aria-expanded="true">
              <svg class="section-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
          </h2>
          <ul id="layer-list" class="layer-list"></ul>
          <div class="layer-list-footer">
            <button id="delete-new-layer-btn" class="icon-btn layer-delete-btn" type="button" title="レイヤー削除" aria-label="レイヤー削除" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6"/>
                <path d="M14 11v6"/>
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
            </button>
          </div>
          </section>
        </aside>
      </main>
    </div>
    <div class="progress-modal" id="progress-modal" data-tauri-drag-region hidden>
      <div class="progress-card" role="dialog" aria-live="polite" aria-busy="true" data-tauri-drag-region>
        <div class="progress-title" id="progress-title" data-tauri-drag-region>読込中</div>
        <div class="progress-detail" id="progress-detail" data-tauri-drag-region></div>
        <div class="progress-track" data-tauri-drag-region>
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-count" id="progress-count" data-tauri-drag-region></div>
      </div>
    </div>
    <div class="hamburger-overlay" id="hamburger-overlay" hidden></div>
    <aside class="hamburger-menu" id="hamburger-menu" hidden aria-label="メニュー">
      <div class="hamburger-menu-header">
        <span class="hamburger-menu-title">メニュー</span>
        <button id="hamburger-close-btn" class="icon-btn" type="button" title="閉じる" aria-label="閉じる">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="hamburger-menu-body"></div>
      <div class="hamburger-menu-footer">
        <button id="workspace-flip-btn" class="menu-icon-btn" type="button" title="ワークスペース反転" aria-label="ワークスペース反転">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">
            <polygon class="flip-left-arrow" points="2,12 10,4 10,20"/>
            <polygon class="flip-right-arrow" points="22,12 14,4 14,20"/>
          </svg>
        </button>
        <button id="theme-toggle-btn" class="menu-icon-btn" type="button" title="テーマ切替" aria-label="テーマ切替">
          <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
        </button>
        <button id="settings-btn" class="menu-icon-btn" type="button" title="環境設定" aria-label="環境設定">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button id="home-btn" class="menu-icon-btn" type="button" title="ホームに戻る" aria-label="ホームに戻る">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4a1 1 0 0 1-1-1v-6h-4v6a1 1 0 0 1-1 1H5a2 2 0 0 1-2-2z"/>
          </svg>
        </button>
      </div>
    </aside>
    <div class="progress-modal" id="confirm-modal" hidden>
      <div class="progress-card" role="dialog" aria-modal="true">
        <div class="progress-title" id="confirm-modal-title">確認</div>
        <div class="confirm-modal-message" id="confirm-modal-message"></div>
        <div class="page-jump-actions">
          <button type="button" id="confirm-modal-cancel" class="page-jump-btn">キャンセル</button>
          <button type="button" id="confirm-modal-ok" class="page-jump-btn page-jump-btn-primary">OK</button>
        </div>
      </div>
    </div>
    <div class="progress-modal" id="resync-modal" hidden>
      <div class="progress-card" role="dialog" aria-modal="true">
        <div class="progress-title">同期モードに戻す</div>
        <div class="confirm-modal-message" id="resync-modal-message">現在のページをどう扱いますか？</div>
        <div class="page-jump-actions">
          <button type="button" id="resync-cancel" class="page-jump-btn">キャンセル</button>
          <button type="button" id="resync-keep" class="page-jump-btn">このまま再同期</button>
          <button type="button" id="resync-match" class="page-jump-btn page-jump-btn-primary">ページを合わせて再同期</button>
        </div>
      </div>
    </div>
    <div class="progress-modal" id="page-jump-modal" hidden>
      <div class="progress-card" role="dialog" aria-label="ページにジャンプ">
        <div class="progress-title">ページにジャンプ</div>
        <input id="page-jump-input" class="page-jump-input" type="number" min="1" step="1" />
        <div class="page-jump-hint" id="page-jump-hint"></div>
        <div class="page-jump-actions">
          <button type="button" id="page-jump-cancel" class="page-jump-btn">キャンセル</button>
          <button type="button" id="page-jump-ok" class="page-jump-btn page-jump-btn-primary">ジャンプ</button>
        </div>
      </div>
    </div>
    <div class="settings-modal" id="settings-modal" hidden>
      <div class="settings-card" role="dialog" aria-modal="true" aria-label="環境設定">
        <div class="settings-header">
          <span class="settings-title">環境設定</span>
          <button type="button" id="settings-close-btn" class="icon-btn settings-close-btn" title="閉じる" aria-label="閉じる">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="settings-tabs" role="tablist">
          <button type="button" class="settings-tab active" data-tab="shortcuts" role="tab" aria-selected="true">ショートカット</button>
          <button type="button" class="settings-tab" data-tab="pageDir" role="tab" aria-selected="false">ページ送り</button>
        </div>
        <div class="settings-tab-panel active" id="settings-tab-shortcuts" role="tabpanel">
          <div class="settings-section-header">
            <span>キーボードショートカット</span>
            <button type="button" id="settings-reset-shortcuts-btn" class="settings-reset-btn">デフォルトに戻す</button>
          </div>
          <div class="shortcut-list" id="shortcut-list"></div>
        </div>
        <div class="settings-tab-panel" id="settings-tab-pageDir" role="tabpanel">
          <div class="settings-section-header">
            <span>ページ送りの方向</span>
          </div>
          <p class="settings-section-desc">←/→ キー（および ▲/▼ ボタン）で前後どちらに進むかを選択します。</p>
          <div class="settings-radio-list">
            <label class="settings-radio-option" data-value="false">
              <input type="radio" name="page-direction" value="false" />
              <span class="settings-radio-body">
                <span class="settings-radio-title">通常</span>
                <span class="settings-radio-desc">← で前ページ、→ で次ページ</span>
              </span>
            </label>
            <label class="settings-radio-option" data-value="true">
              <input type="radio" name="page-direction" value="true" />
              <span class="settings-radio-body">
                <span class="settings-radio-title">反転</span>
                <span class="settings-radio-desc">→ で前ページ、← で次ページ（縦書き右綴じ向け）</span>
              </span>
            </label>
          </div>
        </div>
      </div>
    </div>
    <div class="settings-modal" id="key-capture-modal" hidden>
      <div class="settings-card key-capture-card" role="dialog" aria-modal="true" aria-label="ショートカット入力">
        <div class="settings-header">
          <span class="settings-title" id="key-capture-title">ショートカットを入力</span>
        </div>
        <div class="key-capture-display waiting" id="key-capture-display">キーを押してください…</div>
        <div class="key-capture-hint">Esc でキャンセル / Backspace でクリア</div>
        <div class="key-capture-conflict" id="key-capture-conflict" hidden></div>
        <div class="page-jump-actions">
          <button type="button" id="key-capture-cancel" class="page-jump-btn">キャンセル</button>
          <button type="button" id="key-capture-ok" class="page-jump-btn page-jump-btn-primary" disabled>設定</button>
        </div>
      </div>
    </div>
    <div class="toast-container" id="toast-container" aria-live="polite"></div>
    <div class="drag-overlay" id="drag-overlay" aria-hidden="true"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
